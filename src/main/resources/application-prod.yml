server:
  port: 8081

spring:
  application:
    name: shop

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/shop?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true
    username: shopuser
    password: shoppassword

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        show_sql: false
        format_sql: false

logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql: warn
      springframework:
        jdbc:
          datasource: warn

# Docker 환경에서는 컨테이너 내부 경로 사용
itemImgLocation: "/app/uploads/item/"  # 컨테이너 내부 경로
