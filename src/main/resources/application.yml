server:
  port: 80

spring:
  application:
    name: shop

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shop?serverTimezone=UTC
    username: root
    password: rootuser

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      hibernate:
        show_sql: true    # ?? ??
        format_sql: true  # ?? ???

logging:
  level:
    org:
      hibernate:
        type:
          descriptor:
            sql: trace #??? ???? ??
