server:
  port: 8080

spring:
  application:
    name: shop
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true

logging:
  level:
    org.springframework: info
    org.hibernate.SQL: info        # SQL 쿼리 출력
    org.hibernate.orm.jdbc.bind: trace # 바인딩 값 출력
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: false  # 기본적으로 비활성화
  swagger-ui:
    enabled: false  # 기본적으로 비활성화

# 상품 이미지 업로드 경로
itemImgLocation: "/Users/kim/myroot/shop/item/"

# 리소스 URL 패턴 지정 경로, 프로젝트 외부에서 파일 찾는 경로
uploadPath: "file:////Users/kim/myroot/shop/"