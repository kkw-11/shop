name: Optimized Spring Boot Deploy

on:
  push:
    branches: [ feat/deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build output
        run: |
          echo "JAR file created:"
          ls -la target/shop-0.0.1-SNAPSHOT.jar
          du -h target/shop-0.0.1-SNAPSHOT.jar

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar"
          target: "/home/${{ secrets.SERVER_USER }}/"
          strip_components: 1

      - name: Deploy and start application
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "=== Deployment Started ==="

            # 1. 파일 확인
            echo "Checking JAR file..."
            ls -la ~/shop-0.0.1-SNAPSHOT.jar

            # 2. 기존 애플리케이션 종료 (단순화)
            echo "Stopping existing application..."
            pkill -f 'java -jar' >/dev/null 2>&1 || echo "No running app"
            sleep 3

            # 3. 애플리케이션 시작
            echo "Starting Spring Boot application..."
            cd /home/${{ secrets.SERVER_USER }}
            nohup java -jar shop-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            # 4. 시작 대기
            echo "Waiting for application to start..."
            sleep 10

            # 5. 단순한 프로세스 확인
            echo "Checking if application is running..."
            if pgrep -f "shop-0.0.1-SNAPSHOT.jar" >/dev/null; then
              echo "✅ Application is running!"
              echo "Process info:"
              ps aux | grep "shop-0.0.1-SNAPSHOT.jar" | grep -v grep
            else
              echo "❌ Application not found, checking all java processes..."
              ps aux | grep java | grep -v grep || echo "No java processes found"
              echo "Recent logs:"
              tail -20 app.log
            fi

            echo "=== Deployment Completed ==="