name: Build and Test SSH

on:
  push:
    branches: [ feat/deploy ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: List build output
        run: |
          echo "Target directory contents:"
          ls -la target/
          echo "JAR files:"
          find target/ -name "*.jar" -type f

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "SSH connection successful!"
            whoami
            pwd

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar"
          target: "/home/${{ secrets.SERVER_USER }}/"

      - name: Verify JAR on server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "Checking for JAR file on server:"
            ls -la ~/shop-0.0.1-SNAPSHOT.jar
            echo "File size:"
            du -h ~/shop-0.0.1-SNAPSHOT.jar