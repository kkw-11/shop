name: Deploy Spring Boot to GCP

on:
  push:
    branches: [ main, master, dev, feat/deploy ]  # main 또는 master 브랜치에 push될 때 실행
  pull_request:
    branches: [ main, master, dev, feat/deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Stop application on server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "Stopping Java applications..."
      
            # 실행 중인 Java 프로세스 확인
            if pgrep -f 'java -jar' > /dev/null; then
            echo "Java process found, stopping..."
            pkill -f 'java -jar' 2>/dev/null || true
            sleep 5
            
            # 아직 살아있으면 강제 종료
            if pgrep -f 'java -jar' > /dev/null; then
            echo "Force killing..."
            pkill -9 -f 'java -jar' 2>/dev/null || true
            fi
            echo "Java applications stopped"
            else
            echo "No Java applications running"
            fi
            
            exit 0

      - name: Copy JAR to server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "target/*.jar"
          target: "/home/${{ secrets.SERVER_USER }}/"
          strip_components: 1

      - name: Start application on server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}
            nohup java -jar *.jar > app.log 2>&1 &
            sleep 3
            echo "Application started successfully"