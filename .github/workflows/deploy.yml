name: Deploy Spring Boot to GCP

on:
  push:
    branches: [ main, master, dev, feat/deploy ]  # main 또는 master 브랜치에 push될 때 실행
  pull_request:
    branches: [ main, master, dev, feat/deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Stop application on server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "Stopping Java applications..."
  
            # pkill을 조용하게 실행
            pkill -f 'java -jar' >/dev/null 2>&1 && echo "Java processes terminated" || echo "No Java processes found"
            sleep 3
            pkill -9 -f 'java -jar' >/dev/null 2>&1 && echo "Force killed remaining" || echo "No remaining processes"
            
            echo "Stop completed"
  
      - name: Copy JAR to server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "target/*.jar"
          target: "/home/${{ secrets.SERVER_USER }}/"
          strip_components: 1

      - name: Start application on server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}
            nohup java -jar *.jar > app.log 2>&1 &
            sleep 3
            echo "Application started successfully"