name: Deploy Spring Boot to GCP

on:
  push:
    branches: [ main, master, dev, feat/deploy ]  # main 또는 master 브랜치에 push될 때 실행
  pull_request:
    branches: [ main, master, dev, feat/deploy ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Stop application on server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 모든 Java 프로세스 종료
            echo "Checking for running Java applications..."
            JAVA_PIDS=$(pgrep -f 'java -jar' || echo "")

            if [ -n "$JAVA_PIDS" ]; then
              echo "Found Java applications with PIDs: $JAVA_PIDS"
              echo "Stopping all Java applications..."

              # 모든 Java 프로세스에 SIGTERM 보내기
              pkill -f 'java -jar' || true
              sleep 5

              # 아직 살아있는 프로세스가 있으면 강제 종료
              REMAINING=$(pgrep -f 'java -jar' || echo "")
              if [ -n "$REMAINING" ]; then
                echo "Force killing remaining processes: $REMAINING"
                pkill -9 -f 'java -jar' || true
              fi

              echo "All Java applications stopped"
            else
              echo "No Java application running"
            fi

            echo "Stop process completed successfully"

      - name: Copy JAR to server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "target/*.jar"
          target: "/home/${{ secrets.SERVER_USER }}/"
          strip_components: 1

      - name: Start application on server
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feat/deploy'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}
            nohup java -jar *.jar > app.log 2>&1 &
            sleep 3
            echo "Application started successfully"