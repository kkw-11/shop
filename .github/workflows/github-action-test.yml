name: Docker Compose Deploy

on:
  push:
    branches: [ feat/test-deploy ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build output
        run: |
          echo "JAR file created:"
          ls -la target/shop-0.0.1-SNAPSHOT.jar
          du -h target/shop-0.0.1-SNAPSHOT.jar

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar,docker-compose.yml,Dockerfile,nginx/,src/main/resources/application-prod.yml"
          target: "/home/${{ secrets.TEST_SERVER_USER }}/shop-app/"
          strip_components: 0

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            cd /home/${{ secrets.TEST_SERVER_USER }}/shop-app/
            
            echo "=== Stopping existing containers ==="
            docker-compose down || true
            
            echo "=== Removing old images ==="
            docker image prune -f
            
            echo "=== Starting new deployment ==="
            docker-compose up -d --build
            
            echo "=== Waiting for services to start ==="
            sleep 30
            
            echo "=== Checking container status ==="
            docker-compose ps
            
            echo "=== Checking application health ==="
            for i in {1..10}; do
              if curl -f http://localhost/actuator/health; then
                echo "✅ Application is healthy!"
                break
              else
                echo "Attempt $i: Application not ready yet, waiting 10 seconds..."
                sleep 10
              fi
            done
            
            echo "=== Recent application logs ==="
            docker-compose logs --tail=50 app