name: Test Server Spring Boot Deploy

on:
  push:
    branches: [ feat/test-deploy ]  # 테스트 브랜치
  workflow_dispatch:  # 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build output
        run: |
          echo "JAR file created:"
          ls -la target/shop-0.0.1-SNAPSHOT.jar
          du -h target/shop-0.0.1-SNAPSHOT.jar

      - name: Copy JAR to test server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar"
          target: "/home/${{ secrets.TEST_SERVER_USER }}/"
          strip_components: 1

      - name: Deploy and start application
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            echo "=== Starting deployment ==="
            echo "Checking system resources..."
            free -h
            echo "Available disk space:"
            df -h /
            
            # 기존 프로세스 종료
            pkill -f 'shop-0.0.1-SNAPSHOT.jar' >/dev/null 2>&1 || echo "No running app"
            sleep 5
            
            cd /home/${{ secrets.TEST_SERVER_USER }}
            echo "Starting application with minimal memory settings..."
            # systemd 방식으로 서비스 등록
            cat > /tmp/shop-app.service << EOF
            [Unit]
            Description=Shop Application
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu
            ExecStart=/usr/bin/java -Xmx100m -Xms30m -jar /home/ubuntu/shop-0.0.1-SNAPSHOT.jar --spring.profiles.active=dev
            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            EOF
            
            # 서비스 파일 이동 및 등록
            sudo mv /tmp/shop-app.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl stop shop-app || echo "Service not running"
            sudo systemctl start shop-app
            
            echo "Waiting for application to start..."
            sleep 30
            
            # 서비스 상태 확인
            if sudo systemctl is-active --quiet shop-app; then
                echo "✅ Application started successfully as systemd service"
                echo "Service status:"
                sudo systemctl status shop-app --no-pager
                echo "Application logs:"
                sudo journalctl -u shop-app --no-pager -n 10
            else
                echo "❌ Application failed to start"
                echo "Service status:"
                sudo systemctl status shop-app --no-pager
                echo "Error logs:"
                sudo journalctl -u shop-app --no-pager -n 20
                exit 1
            fi
            
            # 프로세스 확인
            if pgrep -f "shop-0.0.1-SNAPSHOT.jar" > /dev/null; then
                echo "✅ Application started successfully"
                echo "Process ID: $(pgrep -f shop-0.0.1-SNAPSHOT.jar)"
                echo "Memory usage:"
                ps aux | grep shop-0.0.1-SNAPSHOT.jar | grep -v grep
            else
                echo "❌ Application failed to start"
                echo "Last 30 lines of error log:"
                tail -30 app.log
                echo "=== System status ==="
                free -h
                ps aux | grep java
                exit 1
            fi