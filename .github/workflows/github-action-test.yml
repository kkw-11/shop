name: Test Server Spring Boot Deploy

on:
  push:
    branches: [ feat/test-deploy, feat/actuator ]  # 테스트 브랜치
  workflow_dispatch:  # 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build output
        run: |
          echo "JAR file created:"
          ls -la target/shop-0.0.1-SNAPSHOT.jar
          du -h target/shop-0.0.1-SNAPSHOT.jar

      - name: Copy JAR to test server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar"
          target: "/home/${{ secrets.TEST_SERVER_USER }}/"
          strip_components: 1

      - name: Deploy and restart application
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            echo "=== Restarting Shop Application Service ==="
            
            # 서비스 재시작
            sudo systemctl restart shop-app
            
            echo "Waiting for service to start..."
            sleep 30
            
            # 서비스 상태 확인
            if sudo systemctl is-active --quiet shop-app; then
                echo "✅ Application restarted successfully"
                echo "Service status:"
                sudo systemctl status shop-app --no-pager -l
                echo "Recent logs:"
                sudo journalctl -u shop-app --no-pager -n 15 --since "1 minute ago"
                echo "Process info:"
                pgrep -f shop-0.0.1-SNAPSHOT.jar
            else
                echo "❌ Application failed to restart"
                echo "Service status:"
                sudo systemctl status shop-app --no-pager -l
                echo "Error logs:"
                sudo journalctl -u shop-app --no-pager -n 20
                exit 1
            fi