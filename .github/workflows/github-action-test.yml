name: Test Server Spring Boot Deploy

on:
  push:
    branches: [ feat/test-deploy ]  # 테스트 브랜치
  workflow_dispatch:  # 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build output
        run: |
          echo "JAR file created:"
          ls -la target/shop-0.0.1-SNAPSHOT.jar
          du -h target/shop-0.0.1-SNAPSHOT.jar

      - name: Copy JAR to test server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar"
          target: "/home/${{ secrets.TEST_SERVER_USER }}/"
          strip_components: 1

      - name: Deploy and start application
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            echo "=== Starting deployment ==="
            echo "Checking system resources..."
            free -h
            echo "Available disk space:"
            df -h /
            
            # 기존 프로세스 종료
            pkill -f 'shop-0.0.1-SNAPSHOT.jar' >/dev/null 2>&1 || echo "No running app"
            sleep 5
            
            cd /home/${{ secrets.TEST_SERVER_USER }}
            echo "Starting application with minimal memory settings..."
            # 더 안전한 백그라운드 실행 방법
            setsid java -Xmx100m -Xms30m -jar shop-0.0.1-SNAPSHOT.jar --spring.profiles.active=dev > app.log 2>&1 &
            JAVA_PID=$!
            echo "Started Java process with PID: $JAVA_PID"
            
            echo "Waiting for application to start (60 seconds)..."
            # 10초마다 상태 확인하면서 대기
            for i in {1..6}; do
                sleep 10
                echo "[$((i*10))s] Checking process status..."
                if pgrep -f "shop-0.0.1-SNAPSHOT.jar" > /dev/null; then
                    echo "Process is running"
                    if [ -f app.log ]; then
                        echo "Last 5 lines of log:"
                        tail -5 app.log
                    fi
                else
                    echo "Process not found - checking logs..."
                    if [ -f app.log ]; then
                        tail -10 app.log
                    else
                        echo "No log file found"
                    fi
                fi
            done
            
            # 프로세스 확인
            if pgrep -f "shop-0.0.1-SNAPSHOT.jar" > /dev/null; then
                echo "✅ Application started successfully"
                echo "Process ID: $(pgrep -f shop-0.0.1-SNAPSHOT.jar)"
                echo "Memory usage:"
                ps aux | grep shop-0.0.1-SNAPSHOT.jar | grep -v grep
            else
                echo "❌ Application failed to start"
                echo "Last 30 lines of error log:"
                tail -30 app.log
                echo "=== System status ==="
                free -h
                ps aux | grep java
                exit 1
            fi