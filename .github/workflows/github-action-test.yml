name: Test Server Spring Boot Deploy

on:
  push:
    branches: [ feat/test-deploy ]  # 테스트 브랜치
  workflow_dispatch:  # 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify build output
        run: |
          echo "JAR file created:"
          ls -la target/shop-0.0.1-SNAPSHOT.jar
          du -h target/shop-0.0.1-SNAPSHOT.jar

      - name: Copy JAR to test server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          source: "target/shop-0.0.1-SNAPSHOT.jar"
          target: "/home/${{ secrets.TEST_SERVER_USER }}/"
          strip_components: 1

      # 이제 실제 배포 및 시작 테스트
      - name: Deploy and start application
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_KEY }}
          script: |
            echo "=== Starting deployment ==="
            pkill -f 'java -jar' >/dev/null 2>&1 || echo "No running app"
            sleep 5  # 프로세스 완전 종료 대기
            cd /home/${{ secrets.TEST_SERVER_USER }}
            echo "Starting application with dev profile..."
            nohup java -Xmx400m -Xms200m -jar shop-0.0.1-SNAPSHOT.jar --spring.profiles.active=dev > app.log 2>&1 &
            echo "Application restarted successfully"